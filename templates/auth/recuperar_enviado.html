<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Enviado - Sistema Rendiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('/static/imagenes/salmon_background.jpg');
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 50px;
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-lg login-card">
            <div class="card-body p-5 text-center">
                <i class="bi bi-envelope-check text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Revisa tu correo</h3>
                <p class="text-muted mt-2">
                    Si el email ingresado está registrado en el sistema, recibirás un enlace para
                    restablecer tu contraseña en los próximos minutos.
                </p>
                <p class="text-muted small">
                    El enlace expira en <strong>1 hora</strong>. Revisa también tu carpeta de spam.
                </p>
                <hr>
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                </a>
            </div>
        </div>

        <div class="text-center mt-3 text-white">
            <small>© 2024 Sistema de Rendiciones Primar</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
